services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-api
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app/api
      - bundle_cache:/usr/local/bundle
      - api_storage:/app/api/storage
    environment:
      RAILS_ENV: development
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      AI_PROVIDER: ${AI_PROVIDER:-groq}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    stdin_open: true
    tty: true

  client:
    image: node:20-alpine
    container_name: task-client
    working_dir: /app/client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - client_node_modules:/app/client/node_modules
    environment:
      VITE_GRAPHQL_URL: /graphql
      VITE_API_PROXY_TARGET: http://api:3000
      CHOKIDAR_USEPOLLING: "true"
      VITE_HMR_HOST: localhost
    command: sh -c "if [ ! -d node_modules/.bin/vite ]; then npm install; fi && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api
    stdin_open: true
    tty: true

volumes:
  bundle_cache:
  client_node_modules:
  api_storage:
