services:
  db:
    image: postgres:16-alpine
    container_name: task-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-api
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app/api
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/api_development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  client:
    image: node:20-alpine
    container_name: task-client
    working_dir: /app/client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - client_node_modules:/app/client/node_modules
    environment:
      VITE_GRAPHQL_URL: /graphql
      VITE_API_PROXY_TARGET: http://api:3000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api

volumes:
  postgres_data:
  bundle_cache:
  client_node_modules:
