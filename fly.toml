# Fly.io app config. Replace `app` after running: fly apps create <name>
app = "kadince-task-list-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  RAILS_ENV = "production"
  RAILS_LOG_TO_STDOUT = "true"
  SEED_ON_BOOT = "true"
  DATABASE_PATH = "/data/production.sqlite3"
  DATABASE_CACHE_PATH = "/data/production_cache.sqlite3"
  DATABASE_QUEUE_PATH = "/data/production_queue.sqlite3"
  DATABASE_CABLE_PATH = "/data/production_cable.sqlite3"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "20s"
    method = "GET"
    path = "/up"

[[mounts]]
  source = "data"
  destination = "/data"

[deploy]
  release_command = "bin/rails db:prepare"
