# Fly.io app config
app = "kadince-task-list-assignment"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  RAILS_ENV = "production"
  RAILS_LOG_TO_STDOUT = "true"
  SEED_ON_BOOT = "true"
  DATABASE_PATH = "/data/production.sqlite3"
  DATABASE_CACHE_PATH = "/data/production_cache.sqlite3"
  DATABASE_QUEUE_PATH = "/data/production_queue.sqlite3"
  DATABASE_CABLE_PATH = "/data/production_cable.sqlite3"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/up"

[[mounts]]
  source = "data"
  destination = "/data"
