default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

test:
  <<: *default
  database: storage/test.sqlite3

production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DATABASE_PATH") { "storage/production.sqlite3" } %>
  cache:
    <<: *default
    database: <%= ENV.fetch("DATABASE_CACHE_PATH") { "storage/production_cache.sqlite3" } %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("DATABASE_QUEUE_PATH") { "storage/production_queue.sqlite3" } %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("DATABASE_CABLE_PATH") { "storage/production_cable.sqlite3" } %>
    migrations_paths: db/cable_migrate
