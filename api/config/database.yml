default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV.fetch("DATABASE_URL") { "postgres://postgres:postgres@localhost:5432/api_#{Rails.env}" } %>

development:
  <<: *default

test:
  <<: *default

production:
  primary:
    <<: *default
  cache:
    <<: *default
    database: api_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: api_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: api_production_cable
    migrations_paths: db/cable_migrate
